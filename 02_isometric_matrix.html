<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高端几何 - Arquitectura Cinética Minimalista</title>
    <style>
        /* BASE PREMIUM COMPARTIDA */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px; /* Separa ambas piezas en pantalla */
            min-height: 100vh;
            background-color: #0b0c0e; /* Negro azabache de estudio */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* Contenedor de exhibición */
        .art-piece {
            position: relative;
            width: 350px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Leyendas técnicas minimalistas de fondo */
        .meta-text {
            position: absolute;
            bottom: -40px;
            font-size: 10px;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }


        /* ==========================================================
           PIEZA 1: "EL HORIZONTE DE EVENTOS" (Líneas de Tensión Escala)
           ========================================================== */
        .horizon-grid {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .line-element {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0%; /* Cuadrados perfectos */
            animation: kineticPulse 7s cubic-bezier(0.16, 1, 0.3, 1) infinite;
        }

        /* Desfases matemáticos para crear una onda matemática progresiva */
        .line-element:nth-child(1) { animation-delay: 0.2s; width: 100%; height: 100%; }
        .line-element:nth-child(2) { animation-delay: 0.4s; width: 85%; height: 85%; border-color: rgba(255,255,255,0.15); }
        .line-element:nth-child(3) { animation-delay: 0.6s; width: 70%; height: 70%; border-color: rgba(255,255,255,0.25); }
        .line-element:nth-child(4) { animation-delay: 0.8s; width: 55%; height: 55%; border-color: rgba(255,255,255,0.4); }
        .line-element:nth-child(5) { animation-delay: 1.0s; width: 40%; height: 40%; border-color: rgba(255,255,255,0.6); }
        
        /* El centro magnético */
        .dot-center {
            position: absolute;
            width: 5px;
            height: 5px;
            background-color: #ffffff;
            border-radius: 50%;
        }


        /* ==========================================================
           PIEZA 2: "MATRIZ VECTORIAL GATOR" (Rotación 3D Isométrica)
           ========================================================== */
        .isometric-viewport {
            perspective: 1200px;
        }

        .cube-matrix {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
            transform: rotateX(54.7deg) rotateY(45deg); /* Ángulo isométrico perfecto */
            animation: isoRotation 24s linear infinite;
        }

        .vector-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 0.75px solid rgba(255, 255, 255, 0.15);
            background-color: rgba(255, 255, 255, 0.01); /* Opacidad casi imperceptible */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Posicionamiento de las caras del vector en el espacio 3D */
        .face-front  { transform: translateZ(100px); }
        .face-back   { transform: translateZ(-100px) rotateY(180deg); }
        .face-top    { transform: rotateX(90deg) translateZ(100px); }
        .face-bottom { transform: rotateX(-90deg) translateZ(100px); }
        .face-left   { transform: rotateY(-90deg) translateZ(100px); }
        .face-right  { transform: rotateY(90deg) translateZ(100px); }

        /* Dibujo lineal interno de las caras (Miras telescópicas de precisión) */
        .vector-face::before {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            border: 1px solid #ffffff;
            border-radius: 50%;
            animation: coreBreath 3s ease-in-out infinite alternate;
        }


        /* ==========================================================
           CINEMÁTICA INTERNA (TIMING FUNCTIONS DE ALTA PRECISIÓN)
           ========================================================== */

        /* Animación Pieza 1: Respiración estructural con rotación intercalada */
        @keyframes kineticPulse {
            0% {
                transform: rotate(0deg) scale(1);
                border-radius: 0%;
            }
            50% {
                transform: rotate(90deg) scale(0.95);
                border-radius: 50%; /* Transición fluida de cuadrado a círculo */
                border-color: rgba(255, 255, 255, 0.5);
            }
            100% {
                transform: rotate(180deg) scale(1);
                border-radius: 0%;
            }
        }

        /* Animación Pieza 2: Rotación fluida en el plano de ingeniería */
        @keyframes isoRotation {
            from {
                transform: rotateX(54.7deg) rotateY(45deg) rotateZ(0deg);
            }
            to {
                transform: rotateX(54.7deg) rotateY(45deg) rotateZ(360deg);
            }
        }

        /* Latido milimétrico del visor interior */
        @keyframes coreBreath {
            0% {
                transform: scale(0.8);
                opacity: 0.3;
            }
            100% {
                transform: scale(1.2);
                opacity: 0.9;
            }
        }
    </style>
</head>
<body>

    <div class="art-piece">
        <div class="horizon-grid">
            <div class="line-element"></div>
            <div class="line-element"></div>
            <div class="line-element"></div>
            <div class="line-element"></div>
            <div class="line-element"></div>
            <div class="dot-center"></div>
        </div>
        <div class="meta-text">01 // STRUCT.PULSE</div>
    </div>

    <div class="art-piece isometric-viewport">
        <div class="cube-matrix">
            <div class="vector-face face-front"></div>
            <div class="vector-face face-back"></div>
            <div class="vector-face face-top"></div>
            <div class="vector-face face-bottom"></div>
            <div class="vector-face face-left"></div>
            <div class="vector-face face-right"></div>
        </div>
        <div class="meta-text">02 // ISO.MATRIX.3D</div>
    </div>

</body>
</html>
